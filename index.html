<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Score Pro - Pronostics</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
</head>
<body>

    <header class="main-header">
    <div class="header-container">
        <div class="logo">
            <i class="fas fa-horse-head horse-icon"></i> 
        </div>

        <nav class="header-links">
            <a href="index.html">Accueil</a>
            <a href="#leaguesList">Pronos</a>
            <a href="contact.html">Contact</a>
            
            <button id="theme-toggle" class="theme-btn" style="background:none; border:none; cursor:pointer; padding:5px; display:flex; align-items:center;">
    <span id="theme-icon-container" style="width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;">
        </span>
</button>
        </nav>
    </div>
</header>

    <main class="container content-wrapper">
        <section class="main-content">
            <div class="top-banner">
                <img src="image/baner.png" alt="Big Match" class="banner-img">
                <div class="banner-overlay">
                    <span class="category-tag">Match du Jour</span>
                </div>
            </div>

            <div class="days-tabs">
                <div class="tab-item" id="tab-yesterday">Hier</div>
                <div class="tab-item active" id="tab-today">Aujourd'hui</div>
                <div class="tab-item" id="tab-tomorrow">Demain</div>
            </div>

            <div id="leaguesList" class="leagues-container"></div>
        </section>

        <aside class="sidebar-ads">
            <div class="ad-placeholder">Espace Publicitaire</div>
        </aside>
    </main>

    <footer class="main-footer">
        <p>Tous droits réservés &copy; 2026</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
